<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical UV Dosimetry</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --navy-accent: #0f172a;
            --medical-blue: #0284c7;
            --border-color: #e2e8f0;
            --danger: #ef4444;
            --warning: #f59e0b;
            --safe: #22c55e;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        /* --- SPA View Transitions --- */
        .view-container {
            display: none; /* Hidden by default */
            width: 100%;
            max-width: 1000px;
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        .view-container.active {
            display: block; /* Shows the active page */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            margin: 0 auto;
        }

        .input-panel { max-width: 600px; }

        h2 {
            color: var(--navy-accent);
            margin-top: 0;
            font-size: 24px;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--navy-accent);
            padding-bottom: 12px;
            margin-bottom: 30px;
        }

        .form-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .form-group { flex: 1; margin-bottom: 20px; }

        label {
            display: block;
            color: var(--text-main);
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: #fdfdfd;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-main);
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--medical-blue);
        }

        button.primary-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--navy-accent);
            color: white;
            font-family: 'Times New Roman', Times, serif;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button.primary-btn:hover { background-color: #1e293b; }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }

        /* Secondary Back Button */
        button.back-btn {
            background: none;
            border: none;
            color: var(--medical-blue);
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            padding: 0;
            margin-bottom: 20px;
            text-decoration: underline;
        }

        /* --- Report Page Styling --- */
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f1f5f9;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 30px;
            border-left: 5px solid var(--medical-blue);
        }

        .readout-block { text-align: left; }
        .readout-title { font-size: 12px; font-weight: bold; text-transform: uppercase; color: #64748b; }
        .readout-value { font-size: 32px; font-weight: bold; color: var(--navy-accent); margin-top: 5px; }
        
        .risk-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            color: white;
            font-size: 14px;
            text-transform: uppercase;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        #map { height: 350px; width: 100%; border-radius: 6px; border: 1px solid var(--border-color); }
        .chart-container { height: 350px; width: 100%; border: 1px solid var(--border-color); border-radius: 6px; padding: 15px; box-sizing: border-box; }

        #loading-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            justify-content: center; align-items: center;
            font-size: 24px; font-weight: bold; color: var(--medical-blue);
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="loading-overlay">Compiling Clinical Data...</div>

<div id="input-view" class="view-container active">
    <div class="panel input-panel">
        <h2>Patient & Location Parameters</h2>
        <form id="uvForm">
            
            <div class="form-group">
                <label>Fitzpatrick Skin Phototype</label>
                <select id="skinType" required>
                    <option value="">Select Phototype...</option>
                    <option value="I">Type I - Pale white (Always burns, never tans)</option>
                    <option value="II">Type II - Fair (Usually burns, tans minimally)</option>
                    <option value="III">Type III - Light brown (Sometimes burns, usually tans)</option>
                    <option value="IV">Type IV - Moderate brown (Rarely burns, always tans)</option>
                    <option value="V">Type V - Dark brown (Very rarely burns)</option>
                    <option value="VI">Type VI - Deeply pigmented (Never burns)</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label>Target City</label>
                    <input type="text" id="city" placeholder="e.g. Dallas" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>State</label>
                    <input type="text" id="state" placeholder="TX" maxlength="2" required>
                </div>
            </div>

            <div class="form-group">
                <label>Observation Date</label>
                <input type="date" id="date" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Start Time (Local)</label>
                    <input type="time" id="startTime" required>
                </div>
                <div class="form-group">
                    <label>End Time (Local)</label>
                    <input type="time" id="endTime" required>
                </div>
            </div>
            
            <button type="submit" id="submitBtn" class="primary-btn">Generate Diagnostic Report</button>
        </form>
    </div>
</div>

<div id="report-view" class="view-container">
    <div class="panel">
        <button id="backBtn" class="back-btn">← Run New Patient Scan</button>
        <h2>Dosimetry & Photobiology Report</h2>
        
        <div class="report-header">
            <div class="readout-block">
                <div class="readout-title">Total Broadband Exposure</div>
                <div class="readout-value" id="broadband-readout">0 J/m²</div>
            </div>
            <div class="readout-block" style="text-align: right;">
                <div class="readout-title">Clinical Sunburn Risk</div>
                <div id="risk-badge" class="risk-badge" style="background: var(--safe); margin-top: 10px; display: inline-block;">Safe</div>
            </div>
        </div>
        
        <div class="grid-2">
            <div>
                <label>Satellite Telemetry Location</label>
                <div id="map"></div>
            </div>
            <div>
                <label>Erythemal Threshold Analysis</label>
                <div class="chart-container">
                    <canvas id="uvChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    Chart.defaults.font.family = "'Times New Roman', Times, serif";
    Chart.defaults.color = "#1e293b";

    let map = null;
    let marker = null;
    let uvChart = null;

    // Standard Minimal Erythemal Dose (MED) J/m2 thresholds based on Fitzpatrick Type
    const fitzMED = { "I": 200, "II": 250, "III": 300, "IV": 450, "V": 600, "VI": 1000 };

    // PAGE NAVIGATION LOGIC
    const inputView = document.getElementById('input-view');
    const reportView = document.getElementById('report-view');
    const overlay = document.getElementById('loading-overlay');

    document.getElementById('backBtn').addEventListener('click', () => {
        reportView.classList.remove('active');
        inputView.classList.add('active');
    });

    document.getElementById('uvForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        overlay.style.display = "flex";
        
        const skinType = document.getElementById('skinType').value;
        const city = document.getElementById('city').value;
        const state = document.getElementById('state').value;

        try {
            // Geocoding
            const geoQuery = `${city}, ${state} USA`;
            const geoUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(geoQuery)}&limit=1`;
            const geoResponse = await fetch(geoUrl);
            const geoData = await geoResponse.json();

            if (geoData.length === 0) throw new Error("Location not found.");
            const lat = geoData[0].lat;
            const lon = geoData[0].lon;

            // Fetch Python Backend Data
            const payload = {
                latitude: lat,
                longitude: lon,
                date: document.getElementById('date').value,
                start_time: document.getElementById('startTime').value,
                end_time: document.getElementById('endTime').value
            };

            const response = await fetch('/api/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();

            if(!data.success) throw new Error(data.error);

            const broadband = data.results.broadband_uvr_j_m2;
            
            // CLINICAL ESTIMATION: Erythemally-weighted UV is roughly 0.2% of raw solar broadband.
            const erythemalDose = broadband * 0.002; 
            const patientMED = fitzMED[skinType];

            // Update UI Readouts
            document.getElementById('broadband-readout').innerText = broadband.toLocaleString() + " J/m²";
            
            const badge = document.getElementById('risk-badge');
            if (erythemalDose >= patientMED) {
                badge.innerText = "High (Burn Likely)";
                badge.style.background = "var(--danger)";
            } else if (erythemalDose >= (patientMED * 0.5)) {
                badge.innerText = "Moderate (Caution)";
                badge.style.background = "var(--warning)";
            } else {
                badge.innerText = "Low (Safe)";
                badge.style.background = "var(--safe)";
            }

            // Switch Pages
            overlay.style.display = "none";
            inputView.classList.remove('active');
            reportView.classList.add('active');

            // Render Map (Timeout ensures map renders correctly inside newly visible div)
            setTimeout(() => {
                if (!map) {
                    map = L.map('map').setView([lat, lon], 12);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OpenStreetMap'
                    }).addTo(map);
                } else {
                    map.setView([lat, lon], 12);
                }
                if (marker) map.removeLayer(marker);
                marker = L.circleMarker([lat, lon], { color: '#0284c7', radius: 8, fillOpacity: 0.8 }).addTo(map);
                map.invalidateSize();
            }, 100);

            // Render Chart
            const ctx = document.getElementById('uvChart').getContext('2d');
            if (uvChart) uvChart.destroy(); 
            
            uvChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Est. Erythemal Dose Received', `Patient Burn Threshold (Type ${skinType})`],
                    datasets: [{
                        data: [erythemalDose, patientMED], 
                        backgroundColor: [ (erythemalDose > patientMED ? '#ef4444' : '#0284c7'), '#94a3b8']
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });

        } catch (error) {
            overlay.style.display = "none";
            alert(`Error: ${error.message}`);
        }
    });
</script>

</body>
</html>
